<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetForge — Simulador de Redes</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+DQogICAgPGRlZnM+DQogICAgICAgIDxsaW5lYXJHcmFkaWVudCBpZD0iZyIgeDE9IjAiIHkxPSIwIiB4Mj0iMzIiIHkyPSIzMiIgZ3JhZGllbnRVbml0cz0idXNlclNwYWNlT25Vc2UiPg0KICAgICAgICAgICAgPHN0b3Agb2Zmc2V0PSIwIiBzdG9wLWNvbG9yPSIjMjJkM2VlIiAvPg0KICAgICAgICAgICAgPHN0b3Agb2Zmc2V0PSIxIiBzdG9wLWNvbG9yPSIjM2I4MmY2IiAvPg0KICAgICAgICA8L2xpbmVhckdyYWRpZW50Pg0KICAgIDwvZGVmcz4NCiAgICA8cmVjdCB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHJ4PSI3IiBmaWxsPSJ1cmwoI2cpIiAvPg0KICAgIDxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDQgNCkiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzA0MTIxYSIgc3Ryb2tlLXdpZHRoPSIyLjQiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCINCiAgICAgICAgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+DQogICAgICAgIDxjaXJjbGUgY3g9IjEyIiBjeT0iNSIgcj0iMi40IiAvPg0KICAgICAgICA8Y2lyY2xlIGN4PSI1IiBjeT0iMTkiIHI9IjIuNCIgLz4NCiAgICAgICAgPGNpcmNsZSBjeD0iMTkiIGN5PSIxOSIgcj0iMi40IiAvPg0KICAgICAgICA8cGF0aCBkPSJNMTIgNy40djRNMTAgMTNsLTMuNCAzLjZNMTQgMTNsMy40IDMuNiIgLz4NCiAgICA8L2c+DQo8L3N2Zz4NCg==">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="app">
        <header>
            <button class="abtn drawer-toggle mobile-only" id="btnPanelLeft" title="Dispositivos" aria-label="Mostrar dispositivos">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1.5" />
                    <rect x="14" y="3" width="7" height="7" rx="1.5" />
                    <rect x="3" y="14" width="7" height="7" rx="1.5" />
                    <rect x="14" y="14" width="7" height="7" rx="1.5" />
                </svg>
            </button>
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#04121a" stroke-width="2.4" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="5" r="2.4" />
                        <circle cx="5" cy="19" r="2.4" />
                        <circle cx="19" cy="19" r="2.4" />
                        <path d="M12 7.4v4M10 13l-3.4 3.6M14 13l3.4 3.6" />
                    </svg>
                </div>
                <div>
                    <h1>NetForge</h1>
                    <p>Simulador de Redes</p>
                </div>
            </div>

            <div class="tgroup" id="modes">
                <button class="tbtn active" data-mode="select">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M5 3l5 16 2.5-6.5L19 10z" />
                    </svg>Seleccionar</button>
                <button class="tbtn" data-mode="connect">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="6" cy="18" r="3" />
                        <circle cx="18" cy="6" r="3" />
                        <path d="M8.1 15.9l7.8-7.8" />
                    </svg>Conectar</button>
                <button class="tbtn" data-mode="simulate">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 4l13 8-13 8z" />
                    </svg>Simular</button>
            </div>

            <div class="spacer"></div>

            <div class="actions">
                <button class="abtn prime" id="btnDemo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5" />
                        <rect x="14" y="3" width="7" height="7" rx="1.5" />
                        <rect x="3" y="14" width="7" height="7" rx="1.5" />
                        <rect x="14" y="14" width="7" height="7" rx="1.5" />
                    </svg>Ejemplo</button>
                <button class="abtn" id="btnSave">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M5 20h14M12 4v11M7 10l5 5 5-5" />
                    </svg>Guardar</button>
                <button class="abtn" id="btnLoad">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M5 20h14M12 15V4M7 9l5-5 5 5" />
                    </svg>Cargar</button>
                <button class="abtn" id="btnPng">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="16" rx="2" />
                        <circle cx="9" cy="10" r="2" />
                        <path d="M21 16l-5-5-8 8" />
                    </svg>PNG</button>
                <button class="abtn danger" id="btnClear">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" />
                    </svg>Limpiar</button>
            </div>

            <button class="abtn drawer-toggle mobile-only" id="btnConsole" title="Consola" aria-label="Mostrar consola">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="16" rx="2" />
                    <path d="M7 9l3 3-3 3M13 15h4" />
                </svg>
            </button>
            <button class="abtn drawer-toggle mobile-only" id="btnPanelRight" title="Propiedades" aria-label="Mostrar propiedades">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M4 6h11M4 12h8M4 18h13" />
                    <circle cx="18" cy="6" r="2" />
                    <circle cx="15" cy="12" r="2" />
                    <circle cx="20" cy="18" r="2" />
                </svg>
            </button>
        </header>

        <div id="main">
            <aside id="palette"></aside>
            <div class="resizer resizer-v" data-resize="palette" title="Arrastra para redimensionar · doble clic para restablecer"></div>

            <div id="stage">
                <div id="grid"></div>
                <div id="world">
                    <svg id="net">
                        <defs>
                            <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
                                <feGaussianBlur stdDeviation="3" result="b" />
                                <feMerge>
                                    <feMergeNode in="b" />
                                    <feMergeNode in="SourceGraphic" />
                                </feMerge>
                            </filter>
                        </defs>
                        <g id="wifiLayer"></g>
                        <g id="linkLayer"></g>
                        <g id="overlay">
                            <path id="rubber"></path>
                        </g>
                        <g id="packetLayer"></g>
                    </svg>
                    <div id="nodes"></div>
                </div>
                <div id="hint"><span class="dot"></span><span id="hintText"></span></div>
                <div id="simPanel">
                    <span class="sp-lbl">Servicio</span>
                    <select id="simSvc"></select>
                    <span class="sp-port" id="simPort">icmp</span>
                </div>
                <div id="empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="5" r="2.5" />
                        <circle cx="5" cy="19" r="2.5" />
                        <circle cx="19" cy="19" r="2.5" />
                        <path d="M12 7.5v4M10 13l-3.5 3.7M14 13l3.5 3.7" />
                    </svg>
                    <p>Arrastra dispositivos desde el panel izquierdo<br>o pulsa <b>Ejemplo</b> para cargar una red de
                        muestra.</p>
                </div>
                <div id="zoom">
                    <button id="zOut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                            stroke-linecap="round">
                            <path d="M5 12h14" />
                        </svg></button>
                    <span id="zlabel">100%</span>
                    <button id="zIn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                            stroke-linecap="round">
                            <path d="M12 5v14M5 12h14" />
                        </svg></button>
                    <button id="zFit" title="Ajustar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" />
                        </svg></button>
                </div>
            </div>

            <div class="resizer resizer-v" data-resize="inspector" title="Arrastra para redimensionar · doble clic para restablecer"></div>
            <aside id="inspector"></aside>
        </div>

        <div class="resizer resizer-h" data-resize="console" title="Arrastra para redimensionar · doble clic para restablecer"></div>
        <div id="console">
            <div class="con-head">
                <span class="live"></span><span class="ct">Consola de simulación</span>
                <button class="con-clear" id="conClear">Limpiar</button>
                <button class="con-icon mobile-only" id="conClose" aria-label="Cerrar consola">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="log"></div>
        </div>
    </div>
    <div id="backdrop"></div>
    <div id="toasts"></div>
    <input type="file" id="fileInput" accept="application/json" style="display:none">

    <!-- ====================== NetForge JS modules ======================
         Orden importa: cada archivo extiende el namespace global window.NF.
         Capas: core → utils → ui base → domain → simulation → ui resto → io → app
    -->
    <!-- core -->
    <script src="js/core/bus.js"></script>
    <script src="js/core/config.js"></script>
    <script src="js/core/state.js"></script>

    <!-- utils -->
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/ip.js"></script>
    <script src="js/utils/geometry.js"></script>
    <script src="js/utils/icons.js"></script>
    <script src="js/utils/animation.js"></script>

    <!-- ui base (notifier antes que dominio para que `log` esté disponible) -->
    <script src="js/ui/notifier.js"></script>

    <!-- domain -->
    <script src="js/domain/device.js"></script>
    <script src="js/domain/link.js"></script>

    <!-- simulation -->
    <script src="js/simulation/services.js"></script>
    <script src="js/simulation/feasibility.js"></script>
    <script src="js/simulation/pathfinding.js"></script>
    <script src="js/simulation/policies.js"></script>
    <script src="js/simulation/simulator.js"></script>

    <!-- ui resto -->
    <script src="js/ui/render.js"></script>
    <script src="js/ui/nodes.js"></script>
    <script src="js/ui/inspectorTabs.js"></script>
    <script src="js/ui/inspector.js"></script>
    <script src="js/ui/palette.js"></script>
    <script src="js/ui/canvas.js"></script>
    <script src="js/ui/modes.js"></script>
    <script src="js/ui/resizers.js"></script>
    <script src="js/ui/responsive.js"></script>

    <!-- io -->
    <script src="js/io/persistence.js"></script>
    <script src="js/io/pngExport.js"></script>

    <!-- bootstrap -->
    <script src="js/app.js"></script>
</body>

</html>
